# GitHub Actions workflow: build and deploy Angular app to GitHub Pages (gh-pages branch)
# Triggers on pushes to the main branch and deploys the production build artifacts
# Uses peaceiris/actions-gh-pages to publish the contents of `dist/` to `gh-pages` branch

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write

jobs:
  build-and-deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Optional lint (recommended)
        run: |
          # Run lint if the script exists; ignore failures so deploy is not blocked
          npm run lint || true

      - name: Compute base href for GitHub Pages
        id: base-href
        run: |
          REPO_NAME=${{ github.event.repository.name }}
          # If repository is a user/organization page (owner.github.io) then root '/'
          if [[ "$REPO_NAME" == *.github.io ]]; then
            echo "base=/"
            echo "BASE_HREF=/" >> $GITHUB_OUTPUT
          else
            # Repository pages are served under /repo-name/
            echo "base=/${REPO_NAME}/"
            echo "BASE_HREF=/${REPO_NAME}/" >> $GITHUB_OUTPUT
          fi

      - name: Build (production)
        env:
          BASE_HREF: ${{ steps.base-href.outputs.BASE_HREF }}
        run: |
          echo "Building with base-href=$BASE_HREF"
          # Use Angular CLI build with explicit base-href so GitHub Pages serves correctly
          npx ng build --configuration production --base-href "$BASE_HREF"

      - name: Copy CNAME for custom domain (if present)
        run: |
          if [ -f CNAME ]; then
            echo "CNAME found - copying to dist/ to configure custom domain"
            cp CNAME dist/CNAME
          else
            echo "No CNAME file present"
          fi

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          # Use a Personal Access Token (PAT) if your org/repo blocks GITHUB_TOKEN push
          # Create a PAT with `repo` scope and add it to repository secrets as `GH_PAGES_TOKEN`.
          # If you prefer the built-in GITHUB_TOKEN and your repo allows write, replace with
          # `github_token: ${{ secrets.GITHUB_TOKEN }}`.
          github_token: ${{ secrets.GH_PAGES_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist
          # Force update the branch contents on every deploy (overwrites history)
          force_orphan: true

# End of workflow
